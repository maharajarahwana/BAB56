  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bab56</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
  font-size:42px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border:2px solid orange;
  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  font-size:20px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* Perbaikan agar nomor tidak terpotong */

ol{
  text-align:left;
  max-height:65vh;
  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<input type="text" id="answerInput" placeholder="Tulis jawaban di sini">

<button id="nextBtn">Selanjutnya</button>

</div>

<script>

let questions = [

{ soal: "산업 재해", jawaban: "kecelakaan kerja" },
{ soal: "베다", jawaban: "terpotong" },

{ soal: "놀라다", jawaban: "kaget" },
{ soal: "자마자", jawaban: "setelah" },
{ soal: "다행이다", jawaban: "beruntung" },
{ soal: "소방 장비", jawaban: "peralatan pemadam kebakaran" },
{ soal: "사고", jawaban: "kecelakaan" },
{ soal: "응급 상황", jawaban: "keadaan darurat" },
{ soal: "관리감독자", jawaban: "pengawas manajemen" },
{ soal: "대처", jawaban: "penanganan" },
{ soal: "상급자", jawaban: "senior / atasan" },
{ soal: "요령", jawaban: "tips" },
{ soal: "보호하다", jawaban: "melindungi" },
{ soal: "신고하다", jawaban: "melapor" },
{ soal: "소화기", jawaban: "tabung pemadam (APAR)" },
{ soal: "현장 보존", jawaban: "pelestarian lokasi kejadian" },
{ soal: "소방 호스림", jawaban: "gulungan selang damkar" },
{ soal: "소화전", jawaban: "hidran kebakaran" },
{ soal: "조사", jawaban: "survei / penyelidikan" },
{ soal: "소방 사다리", jawaban: "tangga damkar" },
{ soal: "외치다", jawaban: "berteriak" },
{ soal: "화재 경보기", jawaban: "alarm kebakaran" },
{ soal: "비상 전화", jawaban: "telepon darurat" },
{ soal: "진화하다", jawaban: "memadamkan" },
{ soal: "방화문", jawaban: "pintu tahan api" },
{ soal: "강연자", jawaban: "pembicara" },
{ soal: "초기", jawaban: "awal" },
{ soal: "그대로", jawaban: "seperti itu" },
{ soal: "대응", jawaban: "bereaksi / penanganan" },
{ soal: "일손이 부족해요", jawaban: "kekurangan pekerja / staf" },
{ soal: "감전", jawaban: "kesetrum" },
{ soal: "자동 심장 박동기", jawaban: "alat pacu jantung otomatis (AED)" },
{ soal: "질식", jawaban: "sesak napas" },
{ soal: "화재", jawaban: "kebakaran" },
{ soal: "들것", jawaban: "tandu" },
{ soal: "무너짐", jawaban: "ambruk / runtuh" },
{ soal: "음료수", jawaban: "minuman kaleng" },
{ soal: "정지", jawaban: "menghentikan" },
{ soal: "중지", jawaban: "menghentikan" },
{ soal: "산소 호흡기", jawaban: "alat bantu pernapasan oksigen" },
{ soal: "유해", jawaban: "berbahaya" },
{ soal: "숨을 쉬다", jawaban: "bernapas" },
{ soal: "유출", jawaban: "kebocoran / arus keluar" },
{ soal: "비상 탈출용 호흡기", jawaban: "respirator darurat" },
{ soal: "인화성", jawaban: "mudah terbakar" },
{ soal: "구명 부이", jawaban: "pelampung" },
{ soal: "산화성", jawaban: "pengoksidasi" },
{ soal: "구명 조끼", jawaban: "rompi pelampung" },
{ soal: "점화원", jawaban: "sumber pengapian" },
{ soal: "빠지다", jawaban: "terjatuh" },
{ soal: "삐다", jawaban: "keseleo" }

];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>

</body>
</html>
